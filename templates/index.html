<!DOCTYPE html>
<html>

<head>
    <title>Hostel System</title>
    <link
        href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600;700&family=DM+Sans:wght@300;400;500&display=swap"
        rel="stylesheet">

    <!-- Flask version -->
    <!-- <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}"> -->

    <style>
        :root {
            --navy: #0d1b2a;
            --navy2: #132338;
            --gold: #c9a84c;
            --gold2: #e8c96b;
            --cream: #f5f0e8;
            --muted: #8a96a3;
            --card-bg: rgba(255, 255, 255, 0.04);
            --border: rgba(201, 168, 76, 0.25);
        }

        *,
        *::before,
        *::after {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            min-height: 100vh;
            font-family: 'DM Sans', sans-serif;
            background-color: var(--navy);
            color: var(--cream);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            position: relative;
        }

        /* ── Atmospheric background ── */
        body::before {
            content: '';
            position: fixed;
            inset: 0;
            background:
                radial-gradient(ellipse 70% 60% at 50% 0%, rgba(201, 168, 76, .12) 0%, transparent 70%),
                radial-gradient(ellipse 40% 40% at 10% 90%, rgba(201, 168, 76, .07) 0%, transparent 60%),
                radial-gradient(ellipse 50% 50% at 90% 80%, rgba(13, 27, 42, 1) 0%, transparent 100%);
            pointer-events: none;
            z-index: 0;
        }

        /* grid lines */
        body::after {
            content: '';
            position: fixed;
            inset: 0;
            background-image:
                linear-gradient(rgba(201, 168, 76, .04) 1px, transparent 1px),
                linear-gradient(90deg, rgba(201, 168, 76, .04) 1px, transparent 1px);
            background-size: 60px 60px;
            pointer-events: none;
            z-index: 0;
        }

        /* ── Page wrapper ── */
        .page {
            position: relative;
            z-index: 1;
            width: min(520px, 92vw);
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 0;
            animation: fadeUp .8s cubic-bezier(.22, 1, .36, 1) both;
        }

        /* ── Crest / icon area ── */
        .crest {
            width: 64px;
            height: 64px;
            border: 1.5px solid var(--gold);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            margin-bottom: 28px;
            position: relative;
            animation: fadeUp .6s .1s cubic-bezier(.22, 1, .36, 1) both;
        }

        .crest::before,
        .crest::after {
            content: '';
            position: absolute;
            border-radius: 50%;
            border: 1px solid rgba(201, 168, 76, .3);
        }

        .crest::before {
            inset: -8px;
        }

        .crest::after {
            inset: -15px;
        }

        .crest svg {
            width: 30px;
            height: 30px;
            fill: var(--gold);
        }

        /* ── Header ── */
        .header {
            text-align: center;
            margin-bottom: 10px;
            animation: fadeUp .7s .15s cubic-bezier(.22, 1, .36, 1) both;
        }

        .eyebrow {
            font-family: 'DM Sans', sans-serif;
            font-size: 10px;
            font-weight: 500;
            letter-spacing: .22em;
            text-transform: uppercase;
            color: var(--gold);
            margin-bottom: 14px;
        }

        h1 {
            font-family: 'Playfair Display', serif;
            font-size: clamp(2rem, 6vw, 2.8rem);
            font-weight: 700;
            line-height: 1.15;
            color: var(--cream);
            letter-spacing: -.01em;
        }

        h1 span {
            color: var(--gold);
        }

        .subtitle {
            font-size: 13px;
            color: var(--muted);
            margin-top: 10px;
            font-weight: 300;
            letter-spacing: .03em;
        }

        /* ── Divider ── */
        .divider {
            width: 100%;
            display: flex;
            align-items: center;
            gap: 14px;
            margin: 36px 0;
            animation: fadeUp .7s .25s cubic-bezier(.22, 1, .36, 1) both;
        }

        .divider::before,
        .divider::after {
            content: '';
            flex: 1;
            height: 1px;
            background: linear-gradient(90deg, transparent, var(--border), transparent);
        }

        .divider-diamond {
            width: 7px;
            height: 7px;
            border: 1.5px solid var(--gold);
            transform: rotate(45deg);
            flex-shrink: 0;
        }

        /* ── Cards ── */
        .container {
            width: 100%;
            display: flex;
            flex-direction: column;
            gap: 14px;
            animation: fadeUp .7s .3s cubic-bezier(.22, 1, .36, 1) both;
        }

        .portal-link {
            text-decoration: none;
        }

        .portal-card {
            display: flex;
            align-items: center;
            gap: 20px;
            padding: 20px 24px;
            background: var(--card-bg);
            border: 1px solid var(--border);
            border-radius: 12px;
            cursor: pointer;
            position: relative;
            overflow: hidden;
            transition: border-color .3s, background .3s, transform .25s;
        }

        .portal-card::before {
            content: '';
            position: absolute;
            inset: 0;
            background: linear-gradient(135deg, rgba(201, 168, 76, .08), transparent 60%);
            opacity: 0;
            transition: opacity .3s;
        }

        .portal-card:hover {
            border-color: var(--gold);
            background: rgba(201, 168, 76, .07);
            transform: translateY(-2px);
        }

        .portal-card:hover::before {
            opacity: 1;
        }

        .card-icon {
            width: 44px;
            height: 44px;
            border-radius: 10px;
            background: rgba(201, 168, 76, .12);
            border: 1px solid rgba(201, 168, 76, .3);
            display: flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
            transition: background .3s;
        }

        .portal-card:hover .card-icon {
            background: rgba(201, 168, 76, .2);
        }

        .card-icon svg {
            width: 20px;
            height: 20px;
            fill: var(--gold);
        }

        .card-text {
            flex: 1;
        }

        .card-title {
            font-family: 'Playfair Display', serif;
            font-size: 1.05rem;
            font-weight: 600;
            color: var(--cream);
            letter-spacing: .01em;
        }

        .card-desc {
            font-size: 11.5px;
            color: var(--muted);
            margin-top: 3px;
            font-weight: 300;
        }

        .card-arrow {
            color: var(--gold);
            font-size: 1.1rem;
            opacity: 0;
            transform: translateX(-6px);
            transition: opacity .25s, transform .25s;
        }

        .portal-card:hover .card-arrow {
            opacity: 1;
            transform: translateX(0);
        }

        /* ── Footer ── */
        .footer {
            margin-top: 44px;
            font-size: 11px;
            color: rgba(138, 150, 163, .5);
            letter-spacing: .08em;
            text-transform: uppercase;
            animation: fadeUp .7s .45s cubic-bezier(.22, 1, .36, 1) both;
        }

        /* ── Animations ── */
        @keyframes fadeUp {
            from {
                opacity: 0;
                transform: translateY(22px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
    </style>
</head>

<body>

    <div class="page">

        <!-- Crest -->
        <div class="crest">
            <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                <path d="M10 20v-6h4v6h5v-8h3L12 3 2 12h3v8z" />
            </svg>
        </div>

        <!-- Header -->
        <div class="header">
            <p class="eyebrow">Residential Services Portal</p>
            <h1>Hostel <span>Management</span><br>System</h1>
            <p class="subtitle">Select your portal to continue</p>
        </div>

        <!-- Divider -->
        <div class="divider">
            <div class="divider-diamond"></div>
        </div>

        <!-- Portal Cards -->
    <div class="container">

            <a href="/login" class="portal-link">
                <div class="portal-card">
                    <div class="card-icon">
                        <!-- shield icon -->
                        <svg viewBox="0 0 24 24">
                            <path
                                d="M12 1L3 5v6c0 5.25 3.75 10.15 9 11.25C17.25 21.15 21 16.25 21 11V5l-9-4zm0 4l6 2.67V11c0 3.5-2.5 6.79-6 7.93C8.5 17.79 6 14.5 6 11V7.67L12 5z" />
                        </svg>
                    </div>
                    <div class="card-text">
                        <div class="card-title">Administrator</div>
                        <div class="card-desc">Full system access · Manage all records</div>
                    </div>
                    <span class="card-arrow">›</span>
                </div>
            </a>

            <a href="/login" class="portal-link">
                <div class="portal-card">
                    <div class="card-icon">
                        <!-- badge icon -->
                        <svg viewBox="0 0 24 24">
                            <path
                                d="M17 12h-5v5h5v-5zM16 1v2H8V1H6v2H5c-1.1 0-2 .9-2 2v14c0 1.1.9 2 2 2h14c1.1 0 2-.9 2-2V5c0-1.1-.9-2-2-2h-1V1h-2zm3 18H5V8h14v11z" />
                        </svg>
                    </div>
                    <div class="card-text">
                        <div class="card-title">Warden</div>
                        <div class="card-desc">Block oversight · Attendance &amp; approvals</div>
                    </div>
                    <span class="card-arrow">›</span>
                </div>
            </a>

            <a href="/login" class="portal-link">
                <div class="portal-card">
                    <div class="card-icon">
                        <!-- person icon -->
                        <svg viewBox="0 0 24 24">
                            <path
                                d="M12 12c2.7 0 4.8-2.1 4.8-4.8S14.7 2.4 12 2.4 7.2 4.5 7.2 7.2 9.3 12 12 12zm0 2.4c-3.2 0-9.6 1.6-9.6 4.8v2.4h19.2v-2.4c0-3.2-6.4-4.8-9.6-4.8z" />
                        </svg>
                    </div>
                    <div class="card-text">
                        <div class="card-title">Student</div>
                        <div class="card-desc">View room · Requests &amp; announcements</div>
                    </div>
                    <span class="card-arrow">›</span>
                </div>
            </a>

        </div>

        <p class="footer">&copy; 2025 &nbsp;·&nbsp; Hostel Management System</p>
    </div>

</body>

</html>
