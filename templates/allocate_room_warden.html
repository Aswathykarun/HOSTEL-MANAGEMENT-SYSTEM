<!DOCTYPE html>
<html>

<head>
    <title>Room Allocation</title>

    <style>
        body {
            font-family: Arial;
            background: #f4f6f9;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }

        .card {
            background: white;
            padding: 30px;
            width: 350px;
            border-radius: 10px;
            box-shadow: 0 4px 10px rgba(0, 0, 0, 0.1);
        }

        h2 {
            text-align: center;
        }

        input {
            width: 100%;
            padding: 10px;
            margin: 10px 0;
            border-radius: 5px;
            border: 1px solid #ccc;
        }

        button {
            width: 100%;
            padding: 10px;
            background: #007bff;
            color: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
        }

        button:hover {
            background: #0056b3;
        }

        /* SUCCESS POPUP */
        .popup {
            display: none;
            position: fixed;
            top: 20px;
            right: 20px;
            background: #28a745;
            color: white;
            padding: 15px 25px;
            border-radius: 5px;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.2);
        }
    </style>
</head>

<body>

    <div class="card">
        <h2>Room Allocation</h2>

        {% with messages = get_flashed_messages(with_categories=true) %}
        {% if messages %}
        {% for category, message in messages %}
        <div class="flash {{ category }}"
            style="padding:10px; margin-bottom:10px; border-radius:5px; {% if category == 'error' %}background:#f8d7da; color:#721c24; border: 1px solid #f5c6cb;{% else %}background:#d4edda; color:#155724; border: 1px solid #c3e6cb;{% endif %}">
            {{ message }}
        </div>
        {% endfor %}
        {% endif %}
        {% endwith %}

        <form action="/allocate_room" method="POST">
            <input type="number" name="student_id" placeholder="Student ID" required>
            <input type="number" name="room_id" placeholder="Room ID" required>
            <button type="submit">Allocate Room</button>
        </form>
    </div>

</body>

</html>
